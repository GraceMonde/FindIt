<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found System</title>
    <link rel="stylesheet" href="../css/style.css">
    
    <script type="module" src="../js/index.js"></script>
    <script type="module" src="../js/items.js"></script>

</head>
<body>

    <!-- Main Application -->
    <div id="main-app">
        <header class="header">
            <div class="logo">FindIt</div>
                <div class="nav-buttons">
                    <span id="user-name" style="color: white; margin-right: 15px;"></span>
                    <button class="btn btn-secondary" id="profile-btn">Profile</button>
                    <button class="btn btn-secondary" id="report-btn">Report Item</button>
                    <button class="btn btn-primary" id="logout-btn">Logout</button>
                </div>
        </header>
    
        <div id="main-app">
        <header class="header">> 
        <div class="container-fluid">
            <!--<a class="FindIt" href="index.html">FindIt</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button> -->
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">  
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdownMenuLink" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            Report Item
                        </a>
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdownMenuLink" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            Profile
                        </a>
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdownMenuLink" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            Logout
                        </a>
                        <div class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
                            <a class="dropdown-item" href="#">Lost Item</a>
                            <a class="dropdown-item" href="#">Found Item</a>
                        </div>
                    </li>
                </ul>
        </div>
        </header
        </div>

        <!-- report a lost or found item -->
        <div class="main-content">
            <div class="section">
                <h2>Report Lost Item</h2>
                <a href="report-item.html?type=lost" class="btn btn-primary" style="width: 10%;">Report Lost Item</a>
                <p style="margin-top: 15px; color: #7f8c8d;">Lost something? Let others know what you're looking for.</p>
            </div>
            <div class="section">
                <h2>Report Found Item</h2>
                <a href="report-item.html?type=found" class="btn btn-success" style="width: 100%;">Report Found Item</a>
                <p style="margin-top: 15px; color: #7f8c8d;">Found something? Help someone get their item back.</p>
            </div>
        </div>

        <!-- Search and Filter -->
        <div class="search-filter">
            <div class="form-group">
                <label for="search-query">Search Items</label>
                <input type="text" id="search-query" placeholder="Search by title or description...">
            </div>
            <div class="form-group">
                <label for="filter-type">Type</label>
                <select id="filter-type">
                    <option value="">All Items</option>
                    <option value="lost">Lost Items</option>
                    <option value="found">Found Items</option>
                </select>
            </div>
            <div class="form-group">
                <label for="filter-category">Category</label>
                <select id="filter-category">
                    <option value="">All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="clothing">Clothing</option>
                    <option value="books">Books</option>
                    <option value="accessories">Accessories</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <button class="btn btn-secondary" id="search-btn">Search</button>
            </div>
        </div>

        <!-- Items Display -->
        <div id="items-container">
            
        </div>
    </div>

    
</body>
</html>
