<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found System</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Authentication Screen -->
    <div id="auth-screen" class="auth-container">
        <div class="auth-header">
            <h1>🔍 Lost & Found</h1>
            <p>Campus Lost and Found System</p>
        </div>
        
        <div id="error-message" class="error-message hidden"></div>
        <div id="success-message" class="success-message hidden"></div>
        
        <!-- Login Form -->
        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        
        <!-- Register Form -->
        <form id="register-form" class="hidden">
            <div class="form-group">
                <label for="register-name">Full Name</label>
                <input type="text" id="register-name" required>
            </div>
            <div class="form-group">
                <label for="register-email">Email</label>
                <input type="email" id="register-email" required>
            </div>
            <div class="form-group">
                <label for="register-password">Password</label>
                <input type="password" id="register-password" required>
            </div>
            <div class="form-group">
                <label for="register-phone">Phone Number</label>
                <input type="tel" id="register-phone">
            </div>
            <button type="submit" class="btn btn-success" style="width: 100%;">Register</button>
        </form>
        
        <div class="auth-toggle">
            <span id="auth-toggle-text">Don't have an account? </span>
            <a href="#" id="auth-toggle-link">Sign up</a>
        </div>
    </div>

    <!-- Main Application -->
    <div id="main-app" class="container hidden">
        <header class="header">
            <div class="logo">🔍 Lost & Found</div>
            <div class="nav-buttons">
                <span id="user-name" style="color: white; margin-right: 15px;"></span>
                <button class="btn btn-secondary" id="profile-btn">Profile</button>
                <button class="btn btn-primary" id="logout-btn">Logout</button>
            </div>
        </header>

        <!-- Quick Actions -->
        <div class="main-content">
            <div class="section">
                <h2>📋 Report Lost Item</h2>
                <button class="btn btn-primary" id="report-lost-btn" style="width: 100%;">Report Lost Item</button>
                <p style="margin-top: 15px; color: #7f8c8d;">Lost something? Let others know what you're looking for.</p>
            </div>
            <div class="section">
                <h2>✨ Report Found Item</h2>
                <button class="btn btn-success" id="report-found-btn" style="width: 100%;">Report Found Item</button>
                <p style="margin-top: 15px; color: #7f8c8d;">Found something? Help someone get their item back.</p>
            </div>
        </div>

        <!-- Search and Filter -->
        <div class="search-filter">
            <div class="form-group">
                <label for="search-query">Search Items</label>
                <input type="text" id="search-query" placeholder="Search by title or description...">
            </div>
            <div class="form-group">
                <label for="filter-type">Type</label>
                <select id="filter-type">
                    <option value="">All Items</option>
                    <option value="lost">Lost Items</option>
                    <option value="found">Found Items</option>
                </select>
            </div>
            <div class="form-group">
                <label for="filter-category">Category</label>
                <select id="filter-category">
                    <option value="">All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="clothing">Clothing</option>
                    <option value="books">Books</option>
                    <option value="accessories">Accessories</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <button class="btn btn-secondary" id="search-btn">Search</button>
            </div>
        </div>

        <!-- Items Display -->
        <div id="items-container">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading items...</p>
            </div>
        </div>
    </div>

    <!-- Modal for Report Item -->
    <div id="report-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Report Item</h2>
                <span class="close" id="modal-close">&times;</span>
            </div>
            <form id="report-form">
                <div class="form-group">
                    <label for="item-title">Title</label>
                    <input type="text" id="item-title" required>
                </div>
                <div class="form-group">
                    <label for="item-description">Description</label>
                    <textarea id="item-description" required></textarea>
                </div>
                <div class="form-group">
                    <label for="item-category">Category</label>
                    <select id="item-category" required>
                        <option value="">Select Category</option>
                        <option value="electronics">Electronics</option>
                        <option value="clothing">Clothing</option>
                        <option value="books">Books</option>
                        <option value="accessories">Accessories</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="item-location">Location</label>
                    <input type="text" id="item-location" placeholder="Where was it lost/found?" required>
                </div>
                <div class="form-group">
                    <label for="item-date">Date</label>
                    <input type="date" id="item-date" required>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Submit Report</button>
                    <button type="button" class="btn btn-secondary" id="cancel-report">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Profile</h2>
                <span class="close" id="profile-close">&times;</span>
            </div>
            <form id="profile-form">
                <div class="form-group">
                    <label for="profile-name">Full Name</label>
                    <input type="text" id="profile-name" required>
                </div>
                <div class="form-group">
                    <label for="profile-email">Email</label>
                    <input type="email" id="profile-email" required>
                </div>
                <div class="form-group">
                    <label for="profile-phone">Phone Number</label>
                    <input type="tel" id="profile-phone">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Update Profile</button>
                    <button type="button" class="btn btn-secondary" id="cancel-profile">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>

</html>
